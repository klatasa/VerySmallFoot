<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>verysmallfeet · Browse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1c1c1c;
      --bg-deep:   #141414;
      --ink:       #e6e6e6;
      --muted:     #8a8a8a;
      --rule:      rgba(255, 255, 255, 0.22);
      --tile-bg:   #0d0d0d;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Top bar ──────────────────────────────────────────────────────────── */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 16px 28px;
      color: var(--muted);
    }
    .breadcrumb {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .breadcrumb a, .breadcrumb span { color: var(--muted); text-decoration: none; }
    .breadcrumb .sep { opacity: 0.6; }

    .site-title {
      justify-self: center;
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.05em;
      user-select: none;
    }
    .site-title .dot { color: var(--muted); margin: 0 1px; }

    nav.top-nav {
      justify-self: end;
      display: flex;
      gap: 22px;
      font-size: 12px;
    }
    nav.top-nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    nav.top-nav a:hover { color: var(--ink); }

    /* ── Section label ────────────────────────────────────────────────────── */
    .section-label {
      padding: 8px 28px 14px;
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    /* ── Gallery ──────────────────────────────────────────────────────────── */
    main { padding: 0 28px 48px; }

    #gallery {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .row {
      display: flex;
      gap: 0;
    }

    .photo {
      position: relative;
      overflow: hidden;
      background: var(--tile-bg);
      flex-shrink: 0;
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--rule);
    }
    .photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .photo img.loaded { opacity: 1; }

    /* Always-visible caption tab in bottom-left */
    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      max-width: calc(100% - 8px);
      padding: 4px 10px 5px 8px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 11px;
      font-weight: 300;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .caption svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
      opacity: 0.85;
    }
    .caption span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 18px 28px 28px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--ink); }
    footer .spacer { flex: 1; }

    /* ── Loading state ────────────────────────────────────────────────────── */
    .loading {
      padding: 60px 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }

    @media (max-width: 900px) {
      header { padding: 14px 16px; }
      .section-label { padding: 8px 16px 12px; }
      main { padding: 0 16px 40px; }
      footer { padding: 16px; }
      nav.top-nav { gap: 14px; }
    }
    @media (max-width: 600px) {
      .site-title { font-size: 16px; }
      nav.top-nav { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .photo img { transition: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="breadcrumb">
    <a href="#">Home</a>
    <span class="sep">›</span>
    <span>Browse</span>
  </div>
  <div class="site-title">
    v<span class="dot">·</span>e<span class="dot">·</span>r<span class="dot">·</span>y<span class="dot">·</span>s<span class="dot">·</span>m<span class="dot">·</span>a<span class="dot">·</span>l<span class="dot">·</span>l<span class="dot">·</span>f<span class="dot">·</span>e<span class="dot">·</span>e<span class="dot">·</span>t
  </div>
  <nav class="top-nav">
    <a href="#">Home</a>
    <a href="#">Browse</a>
    <a href="#">Folders</a>
    <a href="#">Search</a>
  </nav>
</header>

<div class="section-label">Galleries</div>

<main>
  <div id="gallery"><div class="loading">Loading…</div></div>
</main>

<footer>
  <a href="#">Photo Sharing</a>
  <a href="#">About</a>
  <a href="#">Browse Photos</a>
  <a href="#">Prints &amp; Gifts</a>
  <a href="#">Terms</a>
  <a href="#">Privacy</a>
  <a href="#">Contact</a>
  <span class="spacer"></span>
  <span>© verysmallfeet</span>
</footer>

<script>
  const GAP   = 0;
  const MIN_H = 180;
  const MAX_H = 240;

  // Caption icon (small picture-frame glyph, matches the reference style)
  const ICON_SVG =
    '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">' +
      '<path d="M1.5 3h13a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5zm.5 1v8h12V4H2zm2 1.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm-1 6 3-3 2 2 3-3 3 3v1H3v0z"/>' +
    '</svg>';

  // Filename list: 089 numbered jpgs + 13 named ones.
  const FILES = [
    ...Array.from({ length: 89 }, (_, i) => String(i + 1).padStart(3, '0') + '.jpg'),
    'Abstract.jpg', 'Candids.jpg', 'Flora.jpg', 'Lillies.jpg', 'Macros.jpg',
    'Miscellaneous.jpg', 'Monochrome.jpg', 'N70.jpg', 'Portraits.jpg',
    'Scenics.jpg', 'Studio.jpg', 'Tinidor.jpg', 'Tulips.jpg',
  ];

  // Each entry: { src, title, aspect }. Aspect is filled in by preload().
  const IMAGES = FILES.map(f => ({
    src:    'images/' + encodeURIComponent(f),
    title:  f.replace(/\.[^.]+$/, ''),
    aspect: null,
  }));

  // Probe each image's natural dimensions so the row-packer can use real
  // aspect ratios. Failed loads fall back to 3:2 so a broken image doesn't
  // wreck the layout.
  function preloadAspects(images) {
    return Promise.all(images.map(item => new Promise(resolve => {
      const probe = new Image();
      probe.onload  = () => { item.aspect = probe.naturalWidth / probe.naturalHeight; resolve(); };
      probe.onerror = () => { item.aspect = 3 / 2; resolve(); };
      probe.src = item.src;
    })));
  }

  // Greedy row-packer: add images to a row until the next one would push
  // the row's natural height below MIN_H, then clamp at MAX_H.
  function computeLayout(images, totalWidth) {
    const rows = [];
    let i = 0;
    while (i < images.length) {
      let sumAspects = 0;
      let j = i;
      while (j < images.length) {
        const gaps  = j - i;
        const avail = totalWidth - gaps * GAP;
        const h     = avail / (sumAspects + images[j].aspect);
        if (sumAspects > 0 && h < MIN_H) break;
        sumAspects += images[j].aspect;
        j++;
      }
      if (j === i) { sumAspects = images[i].aspect; j = i + 1; }

      const count    = j - i;
      const avail    = totalWidth - (count - 1) * GAP;
      const naturalH = avail / sumAspects;
      const rowH     = Math.min(MAX_H, naturalH);
      rows.push({ start: i, end: j, height: rowH });
      i = j;
    }
    return rows;
  }

  function render() {
    const gallery = document.getElementById('gallery');
    const W = gallery.clientWidth;
    if (!W || !IMAGES[0].aspect) return;

    gallery.innerHTML = '';

    computeLayout(IMAGES, W).forEach(({ start, end, height }) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.style.height = Math.round(height) + 'px';

      for (let i = start; i < end; i++) {
        const { src, aspect, title } = IMAGES[i];

        const item = document.createElement('a');
        item.className = 'photo';
        item.href = src;
        item.target = '_blank';
        item.rel = 'noopener noreferrer';
        item.style.flex = String(aspect);

        const img = document.createElement('img');
        img.src = src;
        img.alt = title;
        img.loading = 'lazy';
        img.addEventListener('load', () => img.classList.add('loaded'));

        const caption = document.createElement('div');
        caption.className = 'caption';
        caption.innerHTML = ICON_SVG + '<span></span>';
        caption.querySelector('span').textContent = title;

        item.appendChild(img);
        item.appendChild(caption);
        row.appendChild(item);
      }

      gallery.appendChild(row);
    });
  }

  // Re-layout on width changes, debounced through rAF.
  let raf;
  const ro = new ResizeObserver(() => {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(render);
  });
  ro.observe(document.getElementById('gallery'));

  preloadAspects(IMAGES).then(render);
</script>

</body>
</html>
